        body {

            color: #00eaff;
        }

        .version {
    margin-left: auto;
    margin-right: 20px;
    font-size: 14px;
    color: #00eaff;
    text-shadow: 0 0 5px #00eaff88;
}

        /* TOP BAR */

        .topbar {
            height: 60px;
            background: #111827;
            display: flex;
            align-items: center;
            padding-left: 20px;
            border-bottom: 2px solid #00eaff;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        /* LOGIN */

        .login {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: #111827;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 30px #00eaff55;
        }

            .login input {
                display: block;
                width: 250px;
                margin: 10px 0;
                padding: 10px;
                border: none;
                border-radius: 6px;
            }

            .login button {
                width: 100%;
                padding: 10px;
                background: #00eaff;
                border: none;
                border-radius: 6px;
                cursor: pointer;
            }

        /* DASHBOARD */

        .dashboard {
            display: none;
        }

        .sidebar {
            position: absolute;
            top: 60px;
            left: 0;
            width: 220px;
            bottom: 0;
            background: #111827;
            border-right: 2px solid #00eaff33;
        }

            .sidebar button {
                width: 100%;
                padding: 15px;
                background: none;
                border: none;
                color: #00eaff;
                text-align: left;
                cursor: pointer;
            }

                .sidebar button:hover {
                    background: #1f2937;
                }

        .main {
            margin-left: 220px;
            margin-top: 60px;
            padding: 20px;
        }

        /* TERMINAL */

        .terminal {
            background: black;
            border: 2px solid #00eaff;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            font-family: Consolas, monospace;
            white-space: pre-wrap;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        /* DOCUMENT PANEL */

        .docs {
            margin-top: 20px;
        }

            .docs button {
                margin: 5px;
                padding: 8px 14px;
            }
    </style>
</head>

        async function syncWithRemote() {
            const remoteHTML = "https://raw.githubusercontent.com/FurrArmy/Reelmind-Corp-App/main/github/Reelmind_Corp_Terminal_V_Alpha_0.6.html";

            try {
                const response = await fetch(remoteHTML);
                if (!response.ok) throw new Error("Failed to fetch remote app");
                const newHTML = await response.text();
                document.open();
                document.write(newHTML);
                document.close();
            } catch (err) {
                console.error("Sync failed:", err);
                alert("Could not sync with the latest app. Running local version.");
            }
        }

        // Run sync on page load
        window.onload = () => {
            syncWithRemote();
        };

        /* SLOW PRINT */

        function slowPrint(text, speed = 25) {

            const output = document.getElementById("output");

            output.innerText = "";

            let i = 0;

            function type() {

                if (i < text.length) {

                    output.innerText += text.charAt(i);
                    i++;

                    /* AUTO SCROLL */
                    output.scrollTop = output.scrollHeight;

                    setTimeout(type, speed);

                }

            }

            type();
        }

        /* LOGIN */

        function login() {

            let u = document.getElementById("user").value;
            let p = document.getElementById("pass").value;

            let database;

            if (currentSystem === "furrarmy") {
                database = furrArmyUsers;
            }
            else if (currentSystem === "classified") {
                database = classifiedUsers;
            }

            if (database[u] && database[u].password === p) {

                currentUser = database[u];
                currentUsername = u;

                document.getElementById("loginPanel").style.display = "none";
                document.getElementById("dashboard").style.display = "block";

                boot();
                loadDocuments();

            } else {
                document.getElementById("status").innerText = "ACCESS DENIED";
            }
        }

        /* TERMINAL BOOT */

        function boot() {

            let lines = [
                "Connecting to Reelmind Servers...",
                "Authenticating Operator...",
                "Rank: " + currentUser.rank,
                "Team: " + currentUser.team,
                "Clearance Level: " + currentUser.clearance,
                "Access Granted."
            ]

            let i = 0

            let interval = setInterval(() => {

                document.getElementById("output").innerHTML += lines[i] + "\n"

                i++

                if (i >= lines.length) clearInterval(interval)

            }, 600)

        }

        /* CREATE DOCUMENT BUTTONS (VISIBILITY SYSTEM) */

        function loadDocuments() {

            const container = document.getElementById("docButtons");
            container.innerHTML = "";

            let database = currentSystem === "furrarmy"
                ? furrArmyDocuments
                : reelmindDocuments;

            for (const id in database) {
                let doc = database[id];

                if (currentUser.clearance >= doc.level) {

                    let btn = document.createElement("button");
                    btn.innerText = doc.title;

                    btn.onclick = () => showDocument(id);

                    container.appendChild(btn);
                }
            }
        }

        /* SHOW DOCUMENT */

        function showDocument(docId) {

            let database = currentSystem === "furrarmy"
                ? furrArmyDocuments
                : reelmindDocuments;

            let file = database[docId];

            if (currentUser.clearance < file.level) {
                slowPrint("ACCESS DENIED\nREQUIRED CLEARANCE LEVEL: " + file.level, 20);
                return;
            }

            slowPrint(file.text, 25);
        }

        /* UI SWITCH */

        function openTerminal() {
            document.getElementById("terminalView").style.display = "block"
            document.getElementById("docsView").style.display = "none"
